<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Files — ShreeBitu.in</title>
  <meta name="description" content="Explore and discover files shared by the community on ShreeBitu.in.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .fade-in-delay {
      animation: fadeInUp 0.6s ease-out 0.15s forwards;
      opacity: 0;
    }

    .fade-in-delay-2 {
      animation: fadeInUp 0.6s ease-out 0.3s forwards;
      opacity: 0;
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      border-color: #4f46e5;
      box-shadow: 0 8px 30px rgba(79, 70, 229, 0.15);
    }
  </style>
</head>

<body
  class="bg-[#0B0F19] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111827] via-[#0B0F19] to-black text-gray-200 antialiased selection:bg-indigo-500/30">

  <!-- BACKGROUND GLOW -->
  <div class="pointer-events-none fixed inset-0 z-0 flex justify-center">
    <div class="w-[800px] h-[500px] bg-indigo-600/10 rounded-full blur-[120px] -translate-y-1/2"></div>
  </div>

  <!-- HEADER -->
  <header class="sticky top-0 z-50 backdrop-blur backdrop-blur-xl bg-[#0B0F19]/60 border-b border-white/5 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 h-16">
      <div class="flex items-center gap-3">

        <a href="index.html"
          class="text-2xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 hover:opacity-80 drop-shadow-md transition">SHREEBITU</a>
      </div>
            <!-- NAV -->
            <nav class="hidden md:flex items-center gap-8 text-sm" id="mainNav">
                <a href="index.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Home</a>
                <a href="explore.html" class="text-white font-medium">Explore</a>
                <a href="about.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">About</a>
            </nav>

            <!-- BUTTON -->
            <div id="authButtons" class="flex gap-4">
                <a href="login.html" class="border border-white/10 px-4 py-2 rounded-lg text-sm font-medium transition hover:bg-white/5">Login</a>
                <a href="signup.html" class="bg-gradient-to-r from-indigo-600 to-purple-600 shadow-lg shadow-indigo-500/25 px-4 py-2 rounded-lg text-sm font-medium transition hover:scale-105 active:scale-95">Sign Up</a>
            </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="text-center py-16 px-6 fade-in">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-4xl md:text-5xl font-bold text-white leading-tight">
        Explore Files
      </h1>
      <p class="mt-4 text-gray-400/90 text-lg">
        Discover files, apps, documents, and media shared by the community on ShreeBitu.in.
      </p>
    </div>
  </section>

  <!-- SEARCH BAR -->
  <section class="px-6 pb-12 fade-in-delay">
    <div class="max-w-3xl mx-auto">
      <div class="relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search files by name or type..."
          class="w-full backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 rounded-xl pl-12 pr-4 py-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-600 transition">
      </div>

      <!-- CATEGORY FILTERS -->
      <div class="flex flex-wrap gap-3 mt-6">
        <button class="filter-btn bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition"
          data-filter="all">All</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-white hover:text-indigo-400 transition-colors duration-300"
          data-filter="app">📱 Apps</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-white hover:text-indigo-400 transition-colors duration-300"
          data-filter="document">📄 Documents</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-white hover:text-indigo-400 transition-colors duration-300"
          data-filter="image">🖼️ Images</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-white hover:text-indigo-400 transition-colors duration-300"
          data-filter="media">🎬 Media</button>
      </div>
    </div>
  </section>

  <!-- FILE GRID -->
  <section class="px-6 pb-20 fade-in-delay-2">
    <div class="max-w-6xl mx-auto">

      <div id="fileGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- dynamic files loaded here -->

      </div>

      <!-- LOAD MORE -->
      <div class="text-center mt-12">
        <button
          class="border border-gray-700 hover:border-indigo-600 hover:text-white px-8 py-3 rounded-xl text-sm font-medium transition">
          Load More Files
        </button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 py-10 text-center text-gray-500">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex flex-wrap justify-center gap-6 text-sm mb-6">
        <a href="index.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Home</a>
        <a href="upload.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Upload</a>
        <a href="explore.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Explore</a>
        <a href="about.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">About</a>
        <a href="contact.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Contact</a>
        <a href="privacy.html" class="hover:text-white hover:text-indigo-400 transition-colors duration-300">Privacy
          Policy</a>
      </div>
      <p>© 2026 ShreeBitu.in — All rights reserved.</p>
      <p class="mt-2 text-sm">Built with passion and continuous learning.</p>
    </div>
  </footer>

  <script>
    fetch('/api/authcheck').then(r => r.json()).then(data => {
        if (data.authenticated) {
            document.getElementById('mainNav').innerHTML += `<a href="dashboard.html" class="hover:text-white hover:text-indigo-400 font-medium text-indigo-400">Dashboard</a>`;
            document.getElementById('authButtons').innerHTML = `
                <a href="upload.html" class="bg-gradient-to-r from-indigo-600 to-purple-600 px-4 py-2 rounded-lg text-sm font-medium transition hover:scale-105">Upload File</a>
            `;
        }
    });

    // Fetch and display public files
    async function loadPublicFiles() {
        const grid = document.getElementById('fileGrid');
        try {
            const res = await fetch('/api/public/files');
            const data = await res.json();
            
            if (!data.success || data.files.length === 0) {
                grid.innerHTML = '<p class="text-gray-400/90 col-span-full text-center py-6">No public files available.</p>';
                return;
            }

            grid.innerHTML = '';
            data.files.forEach(f => {
                let icon = '📄'; let color = 'bg-indigo-600/20'; let typeCat = 'document';
                if(f.file_type === 'apk') { icon = '📱'; color = 'bg-green-600/20'; typeCat = 'app'; }
                if(f.file_type === 'zip') { icon = '📦'; color = 'bg-yellow-600/20'; typeCat = 'app'; }
                if(f.file_type === 'github') { icon = '💻'; color = 'bg-gray-600/20'; typeCat = 'app'; }
                if(f.file_type === 'ppt') { icon = '📊'; color = 'bg-purple-600/20'; typeCat = 'document'; }

                let metadataStr = '{}';
                try { metadataStr = JSON.parse(f.metadata); } catch(e){}

                grid.innerHTML += `
                <div class="card-hover backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 rounded-2xl p-6 searchable-card" data-type="${typeCat}">
                  <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 ${color} rounded-xl flex items-center justify-center text-2xl">${icon}</div>
                    <div class="overflow-hidden">
                      <h3 class="text-white font-semibold truncate">${f.file_name}</h3>
                      <p class="text-gray-500 text-xs mt-0.5 uppercase">${f.file_type}</p>
                    </div>
                  </div>
                  <p class="text-gray-400/90 text-sm mb-4 line-clamp-2">${metadataStr.description || 'View details page for more info.'}</p>
                  <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-500">Shared publicly</span>
                    <div class="flex gap-2">
                        <a href="view.html?id=${f.id}" class="border border-white/10 hover:border-indigo-500 px-3 py-2 rounded-lg text-xs font-medium transition text-gray-300">View</a>
                        <a href="/api/download/${f.id}" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 shadow-lg shadow-indigo-500/25 border border-white/10 px-3 py-2 rounded-lg text-xs font-medium transition hover:scale-105 active:scale-95 text-white">Download</a>
                    </div>
                  </div>
                </div>`;
            });
        } catch (e) {
            console.error(e);
        }
    }
    loadPublicFiles();
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.className = 'filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-white hover:text-indigo-400 transition-colors duration-300';
        });
        btn.className = 'filter-btn bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition';

        const filter = btn.dataset.filter;
        document.querySelectorAll('#fileGrid > div').forEach(card => {
          if (filter === 'all' || card.dataset.type === filter) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('#fileGrid > div').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(q) ? '' : 'none';
      });
    });
  </script>

</body>

</html>
