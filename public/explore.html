<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById('mobileMenuBtn');
        const sidebar = document.querySelector('aside');
        if (btn && sidebar) {
            let overlay = document.getElementById('sidebarOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'sidebarOverlay';
                overlay.className = 'fixed inset-0 bg-black/60 z-[110] hidden backdrop-blur-md transition-opacity';
                document.body.appendChild(overlay);
            }
            const toggle = (show) => {
                if (show) {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('fixed', 'inset-y-0', 'left-0', 'z-[120]', 'w-72', 'shadow-2xl');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('fixed', 'inset-y-0', 'left-0', 'z-[120]', 'w-72', 'shadow-2xl');
                    overlay.classList.add('hidden');
                }
            };
            btn.addEventListener('click', () => toggle(true));
            overlay.addEventListener('click', () => toggle(false));
        }

        // Mobile search toggle
        const searchToggle = document.getElementById('searchToggleBtn');
        const searchContainer = document.getElementById('searchContainer');
        const mobileSearchInput = document.getElementById('mobileSearchInput');
        if (searchToggle && searchContainer) {
            searchToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                searchContainer.classList.toggle('hidden');
                if (!searchContainer.classList.contains('hidden') && mobileSearchInput) {
                    mobileSearchInput.focus();
                }
            });
            document.addEventListener('click', function(e) {
                if (!searchContainer.contains(e.target) && e.target !== searchToggle) {
                    searchContainer.classList.add('hidden');
                }
            });
        }

        // --- DYNAMIC LOADER INTEGRATION ---
        
        let allItems = [];
        
        const loadExploreData = async () => {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const fileGrid = document.getElementById('fileGrid');
            
            try {
                // Fetch data using the global DynamicLoader
                allItems = await window.DynamicLoader.fetchAll();
                
                // Hide loading spinner
                if (loadingIndicator) loadingIndicator.style.display = 'none';
                
                // Render items
                window.DynamicLoader.render(allItems, 'fileGrid');
                
                // Setup search and filtering
                setupSearchAndFilter();
                
            } catch (error) {
                console.error("Failed to load library items:", error);
                if (loadingIndicator) {
                    loadingIndicator.innerHTML = '<p class="text-red-500 font-medium">Failed to load library items. Please try again.</p>';
                }
            }
        };
        
        const setupSearchAndFilter = () => {
             const searchInput = document.getElementById('searchInput');
             const mobSearchInput = document.getElementById('mobileSearchInput');
             const filterBtns = document.querySelectorAll('.filter-btn');
             const cards = document.querySelectorAll('#fileGrid .app-card');
             
             let currentFilter = 'all';
             let currentQuery = '';
             
             const updateVisibility = () => {
                 let visibleCount = 0;
                 cards.forEach(card => {
                     const text = card.textContent.toLowerCase();
                     const matchesFilter = currentFilter === 'all' || card.dataset.category === currentFilter;
                     
                     // Allow empty query to match everything
                     const matchesSearch = !currentQuery || text.includes(currentQuery); 
                     
                     if (matchesFilter && matchesSearch) {
                         card.style.display = '';
                         visibleCount++;
                     } else {
                         card.style.display = 'none';
                     }
                 });
                 
                 // Show no results message if needed
                 const fileGrid = document.getElementById('fileGrid');
                 let noResults = document.getElementById('noResultsMsg');
                 
                 if (visibleCount === 0) {
                     if (!noResults) {
                         noResults = document.createElement('div');
                         noResults.id = 'noResultsMsg';
                         noResults.className = 'col-span-1 sm:col-span-2 lg:col-span-3 xl:col-span-4 text-center py-12 text-gray-500';
                         fileGrid.appendChild(noResults);
                     }
                     noResults.innerHTML = `No items found matching "${currentQuery}" in this category.`;
                     noResults.style.display = 'block';
                 } else if (noResults) {
                     noResults.style.display = 'none';
                 }
             };
             
             const handleSearch = (e) => {
                 currentQuery = e.target.value.toLowerCase();
                 updateVisibility();
             };
             
             if (searchInput) searchInput.addEventListener('input', handleSearch);
             if (mobSearchInput) mobSearchInput.addEventListener('input', handleSearch);
             
             filterBtns.forEach(btn => {
                 btn.addEventListener('click', () => {
                     // Update button states
                     filterBtns.forEach(b => {
                         b.classList.remove('active');
                         // Make sure bg-gray-100 on "All Items" doesn't clash
                         if (b.classList.contains('bg-gray-100')) {
                            // Leave it, our CSS .active overrides it
                         }
                     });
                     
                     btn.classList.add('active');
                     currentFilter = btn.dataset.filter;
                     updateVisibility();
                 });
             });
        };
        
        // Execute data fetch
        loadExploreData();
    });
</script>
