<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Files — ShreeBitu.in</title>
  <meta name="description" content="Explore and discover files shared by the community on ShreeBitu.in.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    .fade-in-delay {
      animation: fadeInUp 0.6s ease-out 0.15s forwards;
      opacity: 0;
    }

    .fade-in-delay-2 {
      animation: fadeInUp 0.6s ease-out 0.3s forwards;
      opacity: 0;
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
      border-color: #4f46e5;
      box-shadow: 0 8px 30px rgba(79, 70, 229, 0.15);
    }
  </style>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7668010130101569" crossorigin="anonymous"></script>
</head>

<body
  class="bg-[#0B0F19] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111827] via-[#0B0F19] to-black text-gray-200 antialiased selection:bg-indigo-500/30 overflow-x-hidden">

  <!-- BACKGROUND GLOW -->
  <div class="pointer-events-none fixed inset-0 z-0 flex justify-center">
    <div class="w-[800px] h-[500px] bg-indigo-600/10 rounded-full blur-[120px] -translate-y-1/2"></div>
  </div>

  <!-- HEADER -->
  <global-navbar></global-navbar>

  <!-- HERO -->
  <section class="text-center py-10 md:py-16 px-4 md:px-6 fade-in">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-3xl md:text-5xl font-bold text-white leading-tight">
        Explore Files
      </h1>
      <p class="mt-3 md:mt-4 text-gray-400/90 text-base md:text-lg">
        Discover files, apps, documents, and media shared by the community on ShreeBitu.in.
      </p>
    </div>
  </section>

  <!-- SEARCH BAR -->
  <section class="px-4 md:px-6 pb-8 md:pb-12 fade-in-delay">
    <div class="max-w-3xl mx-auto">
      <div class="relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search files by name or type..."
          class="w-full backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 rounded-xl pl-12 pr-4 py-3.5 md:py-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-600 transition text-sm md:text-base">
      </div>

      <!-- CATEGORY FILTERS -->
      <div class="flex flex-wrap gap-2 md:gap-3 mt-4 md:mt-6">
        <button class="filter-btn bg-indigo-600 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-medium transition"
          data-filter="all">All</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm hover:border-indigo-600 hover:text-indigo-400 transition-colors duration-300"
          data-filter="app">📱 Apps</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm hover:border-indigo-600 hover:text-indigo-400 transition-colors duration-300"
          data-filter="document">📄 Docs</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm hover:border-indigo-600 hover:text-indigo-400 transition-colors duration-300"
          data-filter="image">🖼️ Images</button>
        <button
          class="filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm hover:border-indigo-600 hover:text-indigo-400 transition-colors duration-300"
          data-filter="media">🎬 Media</button>
      </div>
    </div>
  </section>

  <!-- FILE GRID -->
  <section class="px-4 md:px-6 pb-16 md:pb-20 fade-in-delay-2">
    <div class="max-w-6xl mx-auto">

      <div id="fileGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">

        <!-- dynamic files loaded here -->

      </div>

      <!-- LOAD MORE -->
      <div class="text-center mt-10 md:mt-12">
        <button
          class="border border-gray-700 hover:border-indigo-600 hover:text-white px-8 py-3 rounded-xl text-sm font-medium transition">
          Load More Files
        </button>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <global-footer></global-footer>

  <script>
    fetch('/api/authcheck').then(r => r.json()).then(data => {
        if (data.authenticated) {
            document.getElementById('mainNav').innerHTML += `<a href="dashboard.html" class="hover:text-indigo-400 font-medium text-indigo-400">Dashboard</a>`;
            document.getElementById('authButtons').innerHTML = `
                <a href="upload.html" class="bg-gradient-to-r from-indigo-600 to-purple-600 px-4 py-2 rounded-lg text-sm font-medium transition hover:scale-105">Upload File</a>
            `;
        }
    });

    // Fetch and display public files
    async function loadPublicFiles() {
        const grid = document.getElementById('fileGrid');
        try {
            const res = await fetch('/api/public/files');
            const data = await res.json();
            
            if (!data.success || data.files.length === 0) {
                grid.innerHTML = '<p class="text-gray-400/90 col-span-full text-center py-6">No public files available.</p>';
                return;
            }

            grid.innerHTML = '';
            data.files.forEach(f => {
                let icon = '📄'; let color = 'bg-indigo-600/20'; let typeCat = 'document';
                if(f.file_type === 'apk') { icon = '📱'; color = 'bg-green-600/20'; typeCat = 'app'; }
                if(f.file_type === 'zip') { icon = '📦'; color = 'bg-yellow-600/20'; typeCat = 'app'; }
                if(f.file_type === 'github') { icon = '💻'; color = 'bg-gray-600/20'; typeCat = 'app'; }
                if(f.file_type === 'ppt') { icon = '📊'; color = 'bg-purple-600/20'; typeCat = 'document'; }

                let metadataStr = '{}';
                try { metadataStr = JSON.parse(f.metadata); } catch(e){}

                grid.innerHTML += `
                <div class="card-hover glass-panel file-card searchable-card" data-type="${typeCat}">
                  <div class="fc-header">
                    <div class="fc-logo-wrap">
                      <span style="font-size:24px;">${icon}</span>
                    </div>
                    <div class="fc-title-block">
                      <span class="fc-badge" style="background:${color}; color:#a5b4fc;">${f.file_type.toUpperCase()}</span>
                      <h3 class="fc-title" title="${f.file_name}">${f.file_name}</h3>
                    </div>
                  </div>
                  <p class="fc-desc">${metadataStr.description || 'View details page for more info.'}</p>
                  <div class="fc-meta">
                    <span class="fc-meta-pill text-gray-400">🌐 Public</span>
                  </div>
                  <div style="display:flex; gap:8px;">
                    <a href="view.html?id=${f.id}" style="flex:1; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:9px 12px; font-size:12px; font-weight:600; color:#cbd5e1; text-decoration:none; transition:all 0.2s;" onmouseover="this.style.borderColor='#6366f1'; this.style.color='#a5b4fc'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.color='#cbd5e1'">View</a>
                    <a href="/api/download/${f.id}" class="fc-btn" style="flex:2; border-radius:10px; padding:9px 12px; font-size:12px;">
                      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                      Download
                    </a>
                  </div>
                </div>`;
            });
        } catch (e) {
            console.error(e);
        }
    }
    loadPublicFiles();
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.className = 'filter-btn backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 text-gray-400/90 px-4 py-2 rounded-lg text-sm hover:border-indigo-600 hover:text-indigo-400 transition-colors duration-300';
        });
        btn.className = 'filter-btn bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition';

        const filter = btn.dataset.filter;
        document.querySelectorAll('#fileGrid > div').forEach(card => {
          if (filter === 'all' || card.dataset.type === filter) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('#fileGrid > div').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(q) ? '' : 'none';
      });
    });
  </script>

  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
</body>

</html>
