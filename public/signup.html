<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up â€” ShreeBitu.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.6s ease-out forwards; }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7668010130101569" crossorigin="anonymous"></script>
</head>
<body class="bg-[#0B0F19] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111827] via-[#0B0F19] to-black text-gray-200 antialiased h-screen flex flex-col">

    <global-navbar></global-navbar>

    <div class="flex-grow flex items-center justify-center fade-in px-4">
        <div class="w-full max-w-md backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 rounded-2xl p-8 pt-10">
            <h2 class="text-3xl font-bold text-white text-center mb-6">Create Account</h2>
            <form id="signupForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full backdrop-blur-md bg-white/[0.02] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full backdrop-blur-md bg-white/[0.02] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div id="errorMsg" class="text-red-400 text-sm hidden"></div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 shadow-lg shadow-indigo-500/25 px-6 py-3 rounded-xl font-medium text-white transition hover:scale-[1.02] active:scale-95">
                    Sign Up
                </button>
            </form>
            <p class="text-center text-gray-400 text-sm mt-6">
                Already have an account? <a href="login.html" class="text-indigo-400 hover:text-white transition">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = 'Creating account...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Client-side validation
                if (password.length < 6) {
                    throw new Error('Password must be at least 6 characters long.');
                }

                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const isJson = res.headers.get('content-type')?.includes('application/json');
                const data = isJson ? await res.json() : null;

                if (res.ok) {
                    // Success!
                    btn.innerHTML = 'Account Created! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    // Server error
                    const errorText = data?.error || `Error ${res.status}: ${res.statusText}`;
                    if (!isJson && res.status === 404) {
                        throw new Error('API Endpoint not found. Cloudflare may still be deploying your backend. Please wait a minute and try again.');
                    }
                    throw new Error(errorText);
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'Sign Up';
                btn.disabled = false;
            } finally {
                // Stop loading if not redirecting
                if (!errorMsg.classList.contains('hidden')) {
                    btn.innerHTML = 'Sign Up';
                    btn.disabled = false;
                }
            }
        });
    </script>
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
</body>
</html>
