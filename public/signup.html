<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShreeBitu Catalog</title>
    <meta name="description" content="Create a ShreeBitu account to manage your software downloads and preferences.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/png" href="https://shreebitu.in/assets/images/shreebitu-logo.png">

    <style>
        body {
            font-family: 'Inter', sans-serif !important;
            background: #0f172a url('assets/images/login_bg.png') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .input-focus:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center p-4">

    <!-- Back to Home -->
    <a href="index.html" class="fixed top-6 left-6 flex items-center gap-2 text-white/80 hover:text-white transition-colors group">
        <div class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 group-hover:bg-white/20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </div>
        <span class="font-medium hidden sm:block">Back to Site</span>
    </a>

    <div class="w-full max-w-[480px] glass-card rounded-2xl p-8 sm:p-10 my-8">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#2563eb] text-white flex items-center justify-center rounded-2xl shadow-lg rotate-3 mx-auto mb-4">
                <svg class="w-10 h-10 -rotate-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Create Account</h1>
            <p class="text-gray-500 mt-2">Join ShreeBitu for the best experience</p>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm font-semibold text-gray-700">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Google
            </button>
            <button class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm font-semibold text-gray-700">
                <img src="https://www.svgrepo.com/show/512317/github-142.svg" class="w-5 h-5" alt="GitHub">
                GitHub
            </button>
        </div>

        <div class="relative mb-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-100"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-3 text-gray-400 font-bold tracking-widest">Or sign up with email</span></div>
        </div>

        <!-- Signup Form -->
        <form action="#" method="POST" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">First Name</label>
                    <input type="text" placeholder="John" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none input-focus transition-all text-[15px]">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">Last Name</label>
                    <input type="text" placeholder="Doe" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none input-focus transition-all text-[15px]">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">Email Address</label>
                <div class="relative">
                    <input type="email" placeholder="name@example.com" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none input-focus transition-all text-[15px]">
                    <svg class="w-5 h-5 text-gray-400 absolute right-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206" />
                    </svg>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">Password</label>
                <div class="relative">
                    <input type="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none input-focus transition-all text-[15px]">
                    <svg class="w-5 h-5 text-gray-400 absolute right-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
            </div>

            <div class="flex items-start pt-1">
                <input type="checkbox" id="terms" required class="w-4 h-4 mt-0.5 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <label for="terms" class="ml-2 text-[13px] text-gray-600 font-medium cursor-pointer leading-tight">
                    I agree to the <a href="#" class="text-blue-600 font-bold hover:underline">Terms of Service</a> and <a href="privacy.html" class="text-blue-600 font-bold hover:underline">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="w-full btn-gradient text-white font-bold py-3.5 rounded-xl text-[16px] mt-4 shadow-lg shadow-blue-500/20 active:scale-[0.98]">
                Create Account
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-gray-500 font-medium">
            Already have an account? 
            <a href="login.html" class="text-blue-600 font-bold hover:underline">Sign in instead</a>
        </p>
    </div>

    <!-- Footer Links -->
    <div class="mt-4 pb-8 flex gap-6 text-[13px] text-white/60 font-medium">
        <a href="privacy.html" class="hover:text-white transition-colors">Privacy Policy</a>
        <a href="#" class="hover:text-white transition-colors">Terms of Service</a>
        <a href="about.html" class="hover:text-white transition-colors">Help Center</a>
    </div>

</body>
</html>
