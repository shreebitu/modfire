<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows — ShreeBitu.in</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7668010130101569" crossorigin="anonymous"></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <global-navbar></global-navbar>
    <section class="container" style="padding: 100px 0 40px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap; gap: 20px;">
            <div>
                <h1 style="font-size: 3rem; margin-bottom: 8px;"> Windows Apps</h1>
                <p style="color: var(--text-secondary);">EXE, MSI, and professional software for PC.</p>
            </div>
            <div style="position: relative; width: 100%; max-width: 400px;">
                <input type="text" id="searchInput" placeholder="Search in this category..." 
                    style="width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: 12px; color: white; outline: none; backdrop-filter: blur(10px);">
            </div>
        </div>
        <div id="dynamicFileGrid" class="grid grid-3"></div>
    </section>
    <global-footer></global-footer>
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../assets/js/dynamicLoader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const items = await DynamicLoader.fetchCategory('windows');
            DynamicLoader.render(items, 'dynamicFileGrid');
            DynamicLoader.setupSearch('searchInput', 'dynamicFileGrid');
        });
    </script>
</body>
</html>
