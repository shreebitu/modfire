    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const trigger = document.getElementById('mobileTrigger');
            const menuBtn = document.getElementById('mobileMenuBtn');
            if(trigger && menuBtn) {
                trigger.onclick = () => menuBtn.click();
            }
            
            // --- DYNAMIC LOADER INTEGRATION ---
            let allItems = [];
            
            const fileGridId = 'dynamicFileGrid';
            
            const loadCategoryData = async () => {
                try {
                    allItems = await window.DynamicLoader.fetchCategory('windows');
                    window.DynamicLoader.render(allItems, fileGridId);
                    setupSearch();
                } catch (error) {
                    console.error("Failed to load category items:", error);
                }
            };
            
            const setupSearch = () => {
                 const searchInput1 = document.getElementById('searchInput');
                 const mobSearchInput = document.getElementById('mobileSearchInput');
                 const cards = document.querySelectorAll(`#${fileGridId} .app-card`);
                 
                 let currentQuery = '';
                 
                 const updateVisibility = () => {
                     let visibleCount = 0;
                     cards.forEach(card => {
                         const text = card.textContent.toLowerCase();
                         if (!currentQuery || text.includes(currentQuery)) {
                             card.style.display = '';
                             visibleCount++;
                         } else {
                             card.style.display = 'none';
                         }
                     });
                 };
                 
                 const handleSearch = (e) => {
                     currentQuery = e.target.value.toLowerCase();
                     updateVisibility();
                 };
                 
                 // Add event listeners to input elements regardless of ID conflict 
                 // (we just attach to whichever one is grabbed by ID, normally the earliest in DOM)
                 // But actually we can query selector all text inputs with a placeholder search...
                 const allSearchInputs = document.querySelectorAll('input[type="text"][placeholder*="earch"]');
                 allSearchInputs.forEach(input => {
                     input.addEventListener('input', handleSearch);
                 });
                 if (mobSearchInput) mobSearchInput.addEventListener('input', handleSearch);
            };
            
            loadCategoryData();
        });
    </script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById('mobileMenuBtn');
        const sidebar = document.querySelector('aside');
        if (btn && sidebar) {
            let overlay = document.getElementById('sidebarOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'sidebarOverlay';
                overlay.className = 'fixed inset-0 bg-black/60 z-[110] hidden backdrop-blur-md transition-opacity';
                document.body.appendChild(overlay);
            }
            const toggle = (show) => {
                if (show) {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('fixed', 'inset-y-0', 'left-0', 'z-[120]', 'w-72', 'shadow-2xl');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('fixed', 'inset-y-0', 'left-0', 'z-[120]', 'w-72', 'shadow-2xl');
                    overlay.classList.add('hidden');
                }
            };
            btn.addEventListener('click', () => toggle(true));
            overlay.addEventListener('click', () => toggle(false));
        }

        // Mobile search toggle
        const searchToggle = document.getElementById('searchToggleBtn');
        const searchContainer = document.getElementById('searchContainer');
        const mobileSearchInput = document.getElementById('mobileSearchInput');
        if (searchToggle && searchContainer) {
            searchToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                searchContainer.classList.toggle('hidden');
                if (!searchContainer.classList.contains('hidden') && mobileSearchInput) {
                    mobileSearchInput.focus();
                }
            });
            document.addEventListener('click', function(e) {
                if (!searchContainer.contains(e.target) && e.target !== searchToggle) {
                    searchContainer.classList.add('hidden');
                }
            });
        }
    });
</script>
