<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Files — ShreeBitu.in</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: 'Outfit', sans-serif; }
    .fade-in { animation: fadeInUp 0.6s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-[#0B0F19] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111827] via-[#0B0F19] to-black text-gray-200 antialiased min-h-screen flex flex-col">

  <!-- HEADER -->
  <global-navbar></global-navbar>

  <!-- UPLOAD FORM -->
  <main class="flex-grow py-16 px-6 fade-in max-w-4xl mx-auto w-full">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-white mb-2">Upload File & Template</h1>
      <p class="text-gray-400">Share your files with custom interactive templates.</p>
    </div>

    <form id="uploadForm" class="backdrop-blur-md bg-white/[0.02] border border-white/5 shadow-2xl shadow-black/50 rounded-2xl p-8 space-y-6">
      
      <!-- Basic Details -->
      <div class="grid md:grid-cols-2 gap-6">
          <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">File Name / Title</label>
              <input type="text" id="file_name" required class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
          </div>
          <div>
              <label class="block text-sm font-medium text-gray-400 mb-1">Visibility</label>
              <select id="is_public" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
                  <option value="true">Public (Visible in Explore)</option>
                  <option value="false">Private (Only you)</option>
              </select>
          </div>
      </div>

      <!-- File selection -->
      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1">File to Upload</label>
        <div class="border-2 border-dashed border-white/10 rounded-xl p-8 text-center hover:border-indigo-500 transition cursor-pointer" id="fileTrigger">
            <input type="file" id="fileInput" class="hidden">
            <div id="fileDisplay" class="text-gray-400">
                <span class="text-2xl mb-2 block">📁</span>
                Click to select a file (Optional for GitHub showcases)
            </div>
        </div>
      </div>

      <!-- Template Selection -->
      <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Select UI Template</label>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              <label class="cursor-pointer">
                  <input type="radio" name="file_type" value="ppt" class="hidden peer" checked>
                  <div class="border border-white/10 rounded-xl p-4 text-center peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition">
                      <div class="text-2xl mb-1">📊</div>
                      <div class="text-sm text-white font-medium">PPT / Docs</div>
                  </div>
              </label>
              <label class="cursor-pointer">
                  <input type="radio" name="file_type" value="apk" class="hidden peer">
                  <div class="border border-white/10 rounded-xl p-4 text-center peer-checked:border-green-500 peer-checked:bg-green-500/10 transition">
                      <div class="text-2xl mb-1">📱</div>
                      <div class="text-sm text-white font-medium">APK App</div>
                  </div>
              </label>
              <label class="cursor-pointer">
                  <input type="radio" name="file_type" value="github" class="hidden peer">
                  <div class="border border-white/10 rounded-xl p-4 text-center peer-checked:border-gray-500 peer-checked:bg-gray-500/10 transition">
                      <div class="text-2xl mb-1">💻</div>
                      <div class="text-sm text-white font-medium">GitHub Repo</div>
                  </div>
              </label>
              <label class="cursor-pointer">
                  <input type="radio" name="file_type" value="zip" class="hidden peer">
                  <div class="border border-white/10 rounded-xl p-4 text-center peer-checked:border-yellow-500 peer-checked:bg-yellow-500/10 transition">
                      <div class="text-2xl mb-1">📦</div>
                      <div class="text-sm text-white font-medium">ZIP Archive</div>
                  </div>
              </label>
          </div>
      </div>

      <!-- Dynamic Metadata Fields -->
      <div id="metadataFields" class="bg-black/20 p-6 rounded-xl border border-white/5 space-y-4">
          <!-- Populated by JS -->
      </div>

      <div id="uploadProgress" class="hidden h-2 w-full bg-gray-800 rounded-full overflow-hidden">
          <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 w-0 transition-all"></div>
      </div>
      <div id="errorMsg" class="text-red-400 text-sm hidden text-center"></div>

      <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 shadow-lg px-6 py-4 rounded-xl font-medium text-white transition hover:scale-[1.01] active:scale-95 text-lg">
          Upload and Publish
      </button>

    </form>
  </main>

  <script>
    // Auth Check
    fetch('/api/authcheck').then(r => r.json()).then(data => {
        if (data.authenticated) {
            document.getElementById('mainNav').innerHTML += `<a href="dashboard.html" class="hover:text-white hover:text-indigo-400 font-medium text-indigo-400">Dashboard</a>`;
            document.getElementById('authButtons').innerHTML = `<button onclick="logout()" class="text-red-400 hover:text-red-300">Logout</button>`;
        } else {
            // Require login to upload
            window.location.href = 'login.html';
        }
    });

    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = 'index.html';
    }

    // Dynamic Metadata UI
    const metadataFields = document.getElementById('metadataFields');
    const radios = document.querySelectorAll('input[name="file_type"]');
    
    function renderMetadataFields() {
        const type = document.querySelector('input[name="file_type"]:checked').value;
        let html = '';
        
        if (type === 'ppt' || type === 'zip') {
            html = `
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Description</label>
                    <textarea id="meta_desc" rows="3" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white" placeholder="Describe this file..."></textarea>
                </div>
            `;
        } else if (type === 'apk') {
            html = `
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Version</label>
                        <input type="text" id="meta_version" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white" placeholder="e.g. 1.0.4">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Developer</label>
                        <input type="text" id="meta_dev" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white" placeholder="Developer name">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Update Notes / Description</label>
                    <textarea id="meta_desc" rows="3" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white"></textarea>
                </div>
            `;
        } else if (type === 'github') {
            html = `
                <div>
                    <label class="block text-sm text-gray-400 mb-1">GitHub Repository URL</label>
                    <input type="url" id="meta_repo" required class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white" placeholder="https://github.com/user/repo">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Tech Stack</label>
                    <input type="text" id="meta_stack" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white" placeholder="Next.js, Tailwind, D1...">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Project Description</label>
                    <textarea id="meta_desc" rows="3" class="w-full bg-gray-900 border border-white/10 rounded-xl px-4 py-2 text-white"></textarea>
                </div>
            `;
        }
        metadataFields.innerHTML = html;
    }

    radios.forEach(r => r.addEventListener('change', renderMetadataFields));
    renderMetadataFields(); // init

    // File Input wrapper
    const fileTrigger = document.getElementById('fileTrigger');
    const fileInput = document.getElementById('fileInput');
    const fileDisplay = document.getElementById('fileDisplay');
    
    fileTrigger.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            const f = fileInput.files[0];
            const size = (f.size / 1024 / 1024).toFixed(2);
            fileDisplay.innerHTML = `<span class="text-indigo-400 font-medium">${f.name}</span> <span class="text-gray-500 text-sm">(${size} MB)</span>`;
            
            // Auto fill title if empty
            if(!document.getElementById('file_name').value) {
                document.getElementById('file_name').value = f.name.split('.')[0];
            }
        }
    });

    // Form Submit
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const err = document.getElementById('errorMsg');
        err.classList.add('hidden');
        btn.disabled = true;
        btn.innerText = 'Uploading...';
        
        const formData = new FormData();
        const type = document.querySelector('input[name="file_type"]:checked').value;
        const file = fileInput.files[0];

        if (!file && type !== 'github') {
            err.innerText = 'Please select a file to upload.';
            err.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = 'Upload and Publish';
            return;
        }

        formData.append('file_name', document.getElementById('file_name').value);
        formData.append('is_public', document.getElementById('is_public').value);
        formData.append('file_type', type);
        if (file) formData.append('file', file);

        // Gather metadata
        let metadata = { description: document.getElementById('meta_desc')?.value || '' };
        if (type === 'apk') {
            metadata.version = document.getElementById('meta_version')?.value || '';
            metadata.developer = document.getElementById('meta_dev')?.value || '';
        } else if (type === 'github') {
            metadata.repo = document.getElementById('meta_repo')?.value || '';
            metadata.stack = document.getElementById('meta_stack')?.value || '';
        }
        formData.append('metadata', JSON.stringify(metadata));

        // Simplified upload progress mock (since standard fetch doesn't support upload progress easily without XHR)
        const prog = document.getElementById('uploadProgress');
        const bar = document.getElementById('progressBar');
        prog.classList.remove('hidden');
        bar.style.width = '50%';

        try {
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            bar.style.width = '100%';
            const data = await res.json();
            
            if (res.ok) {
                // Redirect user to their dashboard or view page
                window.location.href = `view.html?id=${data.fileId}`;
            } else {
                throw new Error(data.error || 'Upload failed');
            }
        } catch (e) {
            err.innerText = e.message;
            err.classList.remove('hidden');
        } finally {
            btn.disabled = false;
            btn.innerText = 'Upload and Publish';
        }
    });
  </script>

  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
</body>
</html>
