<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ShreeBitu.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body class="bg-[#0B0F19] text-gray-200 antialiased min-h-screen flex flex-col">

    <global-navbar></global-navbar>

    <main class="flex-grow max-w-7xl mx-auto w-full px-6 py-10">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold text-white">Your Dashboard</h1>
            <div class="flex items-center gap-4">
                <p id="userEmail" class="text-indigo-400 text-sm font-medium"></p>
                <button id="logoutBtn" class="hidden px-4 py-2 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-lg text-sm font-medium transition">Logout</button>
            </div>
        </div>

        <div class="bg-gray-900 border border-white/5 rounded-2xl overflow-hidden shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-black/40 border-b border-white/5">
                        <th class="px-6 py-4 text-sm font-semibold text-gray-400 uppercase">File Info</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-400 uppercase">Visibility</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-400 uppercase">Type</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-400 uppercase text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="fileTableBody" class="divide-y divide-white/5">
                    <tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading files...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function checkAuth() {
            try {
                const res = await fetch('/api/authcheck');
                const data = await res.json();
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                } else {
                    document.getElementById('userEmail').textContent = data.user.email;
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    loadFiles();
                }
            } catch (err) {
                window.location.href = 'login.html';
            }
        }

        async function loadFiles() {
            try {
                const res = await fetch('/api/files');
                const { files } = await res.json();
                const tbody = document.getElementById('fileTableBody');
                
                if (!files || files.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">No files uploaded yet.</td></tr>`;
                    return;
                }

                tbody.innerHTML = files.map(f => `
                    <tr class="hover:bg-white/[0.02] transition">
                        <td class="px-6 py-4">
                            <p class="text-white font-medium">${f.file_name}</p>
                            <a href="/api/download/${f.id}" class="text-xs text-indigo-400 hover:underline" target="_blank">Download</a>
                            <span class="text-xs text-gray-500 mx-2">|</span>
                            <a href="view.html?id=${f.id}" class="text-xs text-green-400 hover:underline" target="_blank">View Page</a>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-medium ${f.is_public ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
                                ${f.is_public ? 'Public' : 'Private'}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="uppercase text-xs font-bold text-gray-400 bg-gray-800 px-2 py-1 rounded">${f.file_type}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteFile('${f.id}')" class="text-red-400 hover:text-red-300 text-sm font-medium">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteFile(id) {
            if (!confirm('Are you sure you want to delete this file?')) return;
            try {
                const res = await fetch(`/api/file/${id}`, { method: 'DELETE' });
                if (res.ok) loadFiles();
                else alert('Error deleting file');
            } catch (e) {
                alert('Error deleting file');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = 'index.html';
        });

        checkAuth();
    </script>
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>
</body>
</html>
